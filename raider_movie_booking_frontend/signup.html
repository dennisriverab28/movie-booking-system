<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Raider Movie Booking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🎬 Texas Tech Raider Movie Booking - Sign Up 🎬</h1>
    </header>
    <main>
        <div class="form-container">
            <h2>Sign Up</h2>
            <form id="signup-form">
                <input type="text" id="new-username" placeholder="Username" required><br>
                <input type="email" id="email" placeholder="Email" required><br>
                <input type="password" id="new-password" placeholder="Password" required><br>
                <button type="submit">Create Account</button>
            </form>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </main>
    <footer>
        <p>Guns Up! © 2025 Texas Tech University</p>
    </footer>
    <script src="login.js"></script>
</body>
</html>
