<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Movie Details</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    nav {
      margin-bottom: 20px;
    }

    .movie-details {
      max-width: 600px;
      margin: auto;
    }

    .movie-poster {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
    }

    .seat-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 10px 0;
    }

    .seat-row {
      display: flex;
      gap: 10px;
    }

    .seat {
      width: 50px;
      height: 50px;
      background-color: #eee;
      border: 1px solid #aaa;
      cursor: pointer;
      font-weight: bold;
    }

    .seat.available {
      background-color: #bff0b8;
    }

    .seat.unavailable {
      background-color: #d9534f;
      cursor: not-allowed;
    }

    .seat.selected {
      background-color: #5bc0de;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-color {
      width: 20px;
      height: 20px;
      border: 1px solid #000;
    }

    .legend-color.available { background-color: #bff0b8; }
    .legend-color.unavailable { background-color: #d9534f; }
    .legend-color.selected { background-color: #5bc0de; }
  </style>
</head>
<body onload="loadSelectedMovie()">
  <body style="background-color: #2c2c2c; color: #f5f5f5;">

  <h1>🎟️ Movie Details</h1>
  <nav>
    <a href="index.html">Home</a> |
    <a href="admin.html">Admin</a> |
    <a href="bookings.html">My Bookings</a> |
    <a href="wishlist.html">My Wishlist</a>
  </nav>

  <div class="movie-details">
    <img id="movie-poster" class="movie-poster" src="" alt="Movie Poster">
    <h2 id="movie-title">Title</h2>
    <p id="movie-description">desc</p>
    <p><strong>Rating:</strong> <span id="movie-rating"></span> ⭐</p>

    <label>Select Payment Method:</label><br>
    <select id="payment-method" onchange="togglePaymentInputs()">
      <option>Credit Card</option>
      <option>Debit Card</option>
      <option>PayPal</option>
    </select>
    <div id="payment-info" style="margin:10px 0;"></div>

    <h3>Select Seat:</h3>
    <div id="seat-grid" class="seat-grid"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-color available"></span>Available</div>
      <div class="legend-item"><span class="legend-color unavailable"></span>Unavailable</div>
      <div class="legend-item"><span class="legend-color selected"></span>Selected</div>
    </div>
    <p id="seat-error" style="color:red; display:flex; align-items: center;">
      ⚠️ Please choose a seat.
    </p>

    <p><strong>Ticket Price:</strong> $<span id="movie-price"></span></p>
    <button onclick="payAndBook()">Pay &amp; Book Ticket</button>
  </div>

  <script>
    function loadSelectedMovie() {
      createSeatGrid();
      // You can add logic to populate movie details here
    }

    function togglePaymentInputs() {
      const method = document.getElementById('payment-method').value;
      const info = document.getElementById('payment-info');
      info.innerHTML = `You selected <strong>${method}</strong> as your payment method.`;
    }

    function createSeatGrid(rows = 4, cols = 5) {
      const seatGrid = document.getElementById('seat-grid');
      seatGrid.innerHTML = ''; // Clear existing content

      for (let i = 0; i < rows; i++) {
        const row = document.createElement('div');
        row.classList.add('seat-row');

        for (let j = 0; j < cols; j++) {
          const seat = document.createElement('button');
          seat.classList.add('seat', 'available');
          seat.dataset.row = i;
          seat.dataset.col = j;
          seat.innerText = `${String.fromCharCode(65 + i)}${j + 1}`;

          seat.addEventListener('click', () => {
            if (seat.classList.contains('unavailable')) return;

            // Toggle selected
            document.querySelectorAll('.seat.selected').forEach(s => {
              s.classList.remove('selected');
              s.classList.add('available');
            });

            seat.classList.remove('available');
            seat.classList.add('selected');
            document.getElementById('seat-error').style.display = 'none';
          });

          row.appendChild(seat);
        }

        seatGrid.appendChild(row);
      }
    }

    function payAndBook() {
      const selectedSeat = document.querySelector('.seat.selected');
      if (!selectedSeat) {
        document.getElementById('seat-error').style.display = 'flex';
        return;
      }
      alert(`Seat ${selectedSeat.innerText} booked!`);
    }
  </script>
</body>
</html>
