<svg viewBox="0 0 1200 300" width="1200" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Movie Booking System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="1" stop-color="#3b0a45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <circle cx="1040" cy="40" r="260" fill="url(#glow)"/>
  <text x="1015" y="232" font-size="210" text-anchor="middle" opacity="0.12"
        font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif">🎬</text>

  <rect x="70" y="86" width="54" height="6" rx="3" fill="url(#accent)"/>
  <text x="134" y="93" font-family="'SF Mono','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="15" letter-spacing="3" font-weight="600" fill="#ffffff" opacity="0.72">FULL-STACK WEB</text>

  <text x="70" y="158" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="56" font-weight="800" fill="#ffffff">Movie Booking System</text>

  <text x="72" y="200" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="21" fill="#ffffff" opacity="0.82">
    <tspan x="72" dy="0">A full-stack ticketing app — Express REST API with auth,</tspan>
    <tspan x="72" dy="28">bookings, wishlist, reviews &amp; an admin panel.</tspan>
  </text>

  <text x="72" y="268" font-family="'SF Mono','Cascadia Code',ui-monospace,monospace"
        font-size="15" letter-spacing="0.5" fill="#f59e0b" opacity="0.9">Node.js · Express · Vanilla JS · REST · JSON Store</text>

  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
